# ============================================================================
# verify_jwt overrides
# ============================================================================
#
# By default, `supabase functions deploy` sets verify_jwt=true per call,
# OVERWRITING the function's previously-deployed setting. This config.toml
# locks the correct setting at the file layer so the CLI honors it on every
# deploy (no per-call `--no-verify-jwt` flag required). Closes Lock #72.
#
# Two categories need verify_jwt=false:
#
#   1. PUBLIC-FRONTEND FUNCTIONS — called from anonymous browsers (no
#      authenticated session). Gateway JWT check would 401 every request.
#      These functions perform their own input validation.
#
#   2. WEBHOOK ENDPOINTS — authenticate via provider-specific signatures
#      (Stripe HMAC, Resend svix, LearnWorlds HMAC), not Supabase JWT.

# --- Category 1: Public-frontend functions ---

[functions.resend-waitlist]
verify_jwt = false

[functions.record-quiz-completion]
verify_jwt = false

[functions.record-diagnostic-completion]
verify_jwt = false

[functions.submit-feedback]
verify_jwt = false

# Partner / collaborator / co-op / investor inquiries from the public marketing
# site. Anonymous callers; the EF does its own validation. Capture-then-book.
[functions.submit-partner-inquiry]
verify_jwt = false

[functions.constitution-pdf]
verify_jwt = false

[functions.practitioner-waitlist-signup]
verify_jwt = false

[functions.tier-2-waitlist-signup]
verify_jwt = false

# Per-list one-click unsubscribe (RFC 8058). Called from email clients and
# browsers with no Supabase session; security is the signed token, not a JWT.
[functions.unsubscribe]
verify_jwt = false

# Straight-to-checkout redirect for the Deep-Dive Guide, clicked anonymously
# from nurture emails. Plain HTTP 302 to a Stripe session; no Supabase JWT.
[functions.guide-checkout]
verify_jwt = false

# --- Category 2: Webhook endpoints ---

[functions.resend-webhook]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

# LearnWorlds course-purchase webhook. Authenticity = Learnworlds-Webhook-Signature
# (HMAC over the raw body), not a Supabase JWT.
[functions.learnworlds-webhook]
verify_jwt = false
